name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  tests:
    name: Unit / integration tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-image:
    name: Build image (amd64, smoke test, no push)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          tags: url-utilities-admin:ci

      - name: Smoke-start container
        run: |
          docker run --rm -d --name url-utilities-admin-ci \
            -e CORE_URL=http://127.0.0.1:9 \
            -e CORE_API_KEY=ci \
            -e PORT=4000 \
            -p 4000:4000 \
            url-utilities-admin:ci
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:4000/api/health >/dev/null 2>&1; then
              echo "health endpoint responded"
              docker stop url-utilities-admin-ci
              exit 0
            fi
            sleep 1
          done
          echo "health endpoint never responded"
          docker logs url-utilities-admin-ci
          docker stop url-utilities-admin-ci
          exit 1

  build-image-arm64:
    name: Build image (arm64, verification, no push)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: lint-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (arm64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: false
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          tags: url-utilities-admin:ci-arm64
