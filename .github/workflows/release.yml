name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: ralton-dev
  IMAGE_NAME: url-utilities-admin

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tag values
        id: tags
        run: |
          version="${GITHUB_REF_NAME}"
          short_sha="${GITHUB_SHA::7}"
          image="${REGISTRY}/${REGISTRY_NAMESPACE}/${IMAGE_NAME}"
          {
            echo "version=${version}"
            echo "short_sha=${short_sha}"
            echo "image=${image}"
            echo "tag_version=${image}:${version}"
            echo "tag_version_sha=${image}:${version}-${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.tag_version }}
            ${{ steps.tags.outputs.tag_version_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
